name: control_vac_animal
description: "VacunApp - Gestión de campañas de vacunación animal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # === Supabase ===
  supabase_flutter: ^2.8.0

  url_launcher: ^6.3.0   # para abrir Google Maps
  # === State Management ===
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # === Dependency Injection ===
  get_it: ^8.0.2

  # === Navigation ===
  go_router: ^14.6.2

  # === Local Database (Offline) ===
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # === Network ===
  connectivity_plus: ^6.1.1

  # === Camera & Media ===
  image_picker: ^1.1.2

  # === Location / GPS ===
  geolocator: ^13.0.2

  # === Charts ===
  fl_chart: ^0.69.2

  # === UI Utilities ===
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # === Security ===
  flutter_secure_storage: ^9.2.3

  # === Utilities ===
  dartz: ^0.10.1
  uuid: ^4.5.1
  logger: ^2.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # === Code Generation ===
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

  # === Testing ===
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # === Linting ===
  flutter_lints: ^5.0.0

  # === App Icon & Splash ===
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/splash/

# ─── App Icon ────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#0f4c81"
  adaptive_icon_foreground: "assets/icons/icon.png"

# ─── Native Splash Screen ────────────────────────────────────────────────────
flutter_native_splash:
  color: "#0f4c81"
  image: "assets/splash/splash.png"
  android: true
  ios: false
  web: false
  fullscreen: true
